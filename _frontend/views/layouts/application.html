<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Genderbase</title>
    <meta name="description" content="Educational resources about topics of gender" />

    <!-- Stylesheets -->
    <link rel="stylesheet" href="/assets/css/tailwind.css" />
    <link rel="stylesheet" href="/assets/css/application.css" />

    <!-- Scripts -->
    <script src="/assets/js/application.js" defer></script>
  </head>
  <body class="min-h-screen bg-background font-sans antialiased">
    <div class="relative flex min-h-screen flex-col" data-controller="theme">
      <!-- Header -->
      <header class="sticky top-0 z-40 w-full border-b bg-background">
        <div class="container flex h-16 items-center space-x-4 sm:justify-between sm:space-x-0">
          <!-- Main Navigation -->
          <div class="flex gap-6 md:gap-10">
            <a href="/" class="flex items-center space-x-2">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="h-6 w-6 text-primary"
              >
                <path
                  d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"
                ></path>
              </svg>
              <span class="inline-block font-bold">Genderbase</span>
            </a>
            <nav class="flex items-center space-x-4 lg:space-x-6">
              <a href="/knowledge-base" class="text-sm font-medium transition-colors hover:text-primary">
                Knowledge Base
              </a>
              <a href="/how-do-i-say" class="text-sm font-medium transition-colors hover:text-primary">
                How Do I Say...?
              </a>
              <a href="/answered-questions" class="text-sm font-medium transition-colors hover:text-primary">
                Answered Questions
              </a>
            </nav>
          </div>
          <div class="flex flex-1 items-center justify-end space-x-4">
            <nav class="flex items-center space-x-2">
              <a
                href="/ask"
                class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2"
              >
                Ask a Question
              </a>
              <button
                data-action="theme#toggle"
                data-theme-target="toggle"
                title="Toggle Theme"
                aria-label="Toggle dark/light theme"
                class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-10 w-10 p-0"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="sun h-[1.2rem] w-[1.2rem] rotate-0 scale-100 transition-all dark:-rotate-90 dark:scale-0"
                >
                  <circle cx="12" cy="12" r="4"></circle>
                  <path d="M12 2v2"></path>
                  <path d="M12 20v2"></path>
                  <path d="m4.93 4.93 1.41 1.41"></path>
                  <path d="m17.66 17.66 1.41 1.41"></path>
                  <path d="M2 12h2"></path>
                  <path d="M20 12h2"></path>
                  <path d="m6.34 17.66-1.41 1.41"></path>
                  <path d="m19.07 4.93-1.41 1.41"></path>
                </svg>
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="moon h-[1.2rem] w-[1.2rem] rotate-90 scale-0 transition-all dark:rotate-0 dark:scale-100"
                >
                  <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
                </svg>
              </button>
            </nav>
          </div>
        </div>
      </header>

      <!-- Main Content -->
      <div class="flex-1" id="content">
        <!-- Content will be injected here -->
      </div>

      <!-- Footer -->
      <footer class="border-t bg-background">
        <div class="container flex flex-col items-center justify-between gap-4 py-10 md:h-24 md:flex-row md:py-0">
          <div class="flex flex-col items-center gap-4 px-8 md:flex-row md:gap-2 md:px-0">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="h-5 w-5 text-primary"
            >
              <path
                d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"
              ></path>
            </svg>
            <p class="text-center text-sm leading-loose md:text-left">
              Built with care for the gender-diverse community.
            </p>
          </div>
          <div class="flex gap-4">
            <a href="/about" class="text-sm font-medium underline underline-offset-4"> About </a>
            <a href="/volunteer" class="text-sm font-medium underline underline-offset-4"> Volunteer </a>
            <a href="/privacy" class="text-sm font-medium underline underline-offset-4"> Privacy </a>
            <a
              href="/responder"
              class="text-sm font-medium text-muted-foreground hover:text-foreground"
              aria-label="Responder Dashboard"
            >
              Responder
            </a>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
