# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.22.12
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.6.8
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - ruby@3.4.2
    - go@1.21.0
    - node@18.20.5
    - python@3.10.8
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  disabled:
    - djlint
    - markdown-table-prettify
    - markdownlint
    - remark-lint
  definitions:
    - name: rails-test
      files:
        - ALL
      commands:
        - name: rails-test
          output: pass_fail
          run: bin/rails test
          success_codes: [0, 1]
  ignore:
    - linters:
        - prettier
      paths:
        - "**/*.js"
        - "**/*.cjs"
        - "**/*.mjs"
        - "**/*.json"
        - "**/*.css"
    - linters:
        - shellcheck
      paths:
        - bin/mise
        - bin/docker-entrypoint
    - linters:
        - ALL
      paths:
        - _tickets/**
  enabled:
    - markdownlint-cli2@0.17.2
    - biome@1.9.4
    - dustilock@1.2.0
    - eslint@9.25.1
    - gitleaks@8.24.3
    - markdown-link-check@3.13.7
    - rails-test
    - semgrep@1.116.0
    - sort-package-json@3.0.0
    - stylelint@16.19.0
    - terrascan@1.19.1
    - vale@3.11.2
    - taplo@0.9.3
    - actionlint@1.7.7
    - brakeman
    - checkov@3.2.408
    - git-diff-check
    - hadolint@2.12.1-beta
    - osv-scanner@2.0.1
    - oxipng@9.1.4
    - prettier@3.5.3
    - rubocop
    - shellcheck@0.10.0
    - shfmt@3.6.0
    - svgo@3.3.2
    - trufflehog@3.88.25
    - yamllint@1.37.0
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
    - trunk-cache-prune
    - git-lfs
    - rails-test
  definitions:
    - id: rails-test
      display_name: Rails Test
      run: bin/rails test
      triggers:
        - git_hooks:
            - pre-commit
