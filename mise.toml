[env]
GENDERBASE_MISE_ACTIVE = 'true'

[settings]
env_file = '.env'

[tools]
node = { version = '23.11.0' }
pnpm = { version = '10.7.1' }
redis = { version = '7.4.2' }
ruby = { version = '3.4.2' }

[tasks]
dev = 'foreman start -f Procfile.dev'
prepare-ci = 'gem install bundler; bundle install; bundle binstubs --all; pnpm install --verify-store-integrity'
'ci:brakeman' = { run = 'bin/brakeman --no-pager' }
'ci:rubocop' = { run = 'bin/rubocop -f github' }
'ci:test' = { env = { RAILS_ENV = 'test' }, run = 'bin/rails db:test:prepare test test:system' }
ci = { depends = 'ci:*' }
